<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prijava — CMN Predračun</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0D47A1 0%,#1565C0 60%,#1976D2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:40px 38px;width:100%;max-width:380px;}
.login-card img{width:72px;display:block;margin:0 auto 10px;}
.login-card h4{text-align:center;font-weight:800;color:#1565C0;margin-bottom:4px;}
.login-card p.sub{text-align:center;color:#777;font-size:13px;margin-bottom:24px;}
.form-label{font-weight:600;font-size:13px;}
.btn-login{background:#1565C0;color:#fff;width:100%;padding:10px;font-weight:700;border-radius:8px;border:none;}
.btn-login:hover{background:#0D47A1;color:#fff;}
.alert{font-size:13px;border-radius:8px;}
</style>
</head>
<body>
<div class="login-card">
  <img src="/static/img/logo.png" alt="CMN">
  <h4>CMN Predračun</h4>
  <p class="sub">Centar za menadžment d.o.o.</p>
  {% with msgs=get_flashed_messages(with_categories=true) %}
    {% for cat,msg in msgs %}
      <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Korisničko ime</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label">Lozinka</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn-login">Prijavi se</button>
  </form>
</div>
</body>
</html>
